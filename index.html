<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>SiteSelo — Launch Your Business Website in Minutes</title>
    <meta
      name="description"
      content="SiteSelo helps local businesses create professional websites in minutes. Built for restaurants, salons, clinics, and service businesses."
    />
    <meta name="theme-color" content="#14532D" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

      property="og:description"
      content="Turn your business details into a professional website with SiteSelo. No designer, no developer, no complicated setup."

      name="twitter:description"
      content="A simple website platform for local businesses that need to get online fast."
    />

    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
